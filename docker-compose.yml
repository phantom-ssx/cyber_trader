version: "3.9"

# ─── CyberTrader Docker Compose ──────────────────────────────────────────────
# Paper trading:  docker compose up paper-trader
# Live trading:   docker compose up live-trader
# Download data:  docker compose run --rm downloader --symbol ETH-USDT --timeframe 1h --start 2024-01-01
# Backtest:       docker compose run --rm backtest
# Jupyter:        docker compose up jupyter

services:

  # ── TimescaleDB (optional, for production metrics) ──────────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cyber_trader
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d cyber_trader"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Paper trading ────────────────────────────────────────────────────────────
  paper-trader:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    command: python scripts/run_paper.py --config config/paper_trading.yaml
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  # ── Live trading ─────────────────────────────────────────────────────────────
  live-trader:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    command: python scripts/run_live.py --config config/live_trading.yaml --confirm
    restart: unless-stopped
    profiles:
      - live                     # Only start with: docker compose --profile live up
    depends_on:
      db:
        condition: service_healthy

  # ── One-off data downloader ──────────────────────────────────────────────────
  downloader:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
    entrypoint: python scripts/download_data.py
    profiles:
      - tools

  # ── One-off backtesting ──────────────────────────────────────────────────────
  backtest:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    command: python scripts/run_backtest.py --config config/backtest.yaml
    profiles:
      - tools

  # ── Jupyter for analysis ─────────────────────────────────────────────────────
  jupyter:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./notebooks:/app/notebooks
      - ./cyber_trader:/app/cyber_trader
    ports:
      - "8888:8888"
    command: jupyter notebook --ip=0.0.0.0 --no-browser --allow-root --notebook-dir=/app/notebooks
    profiles:
      - tools

volumes:
  pgdata:
