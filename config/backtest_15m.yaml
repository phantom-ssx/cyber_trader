# ─── 15-minute Multi-Timeframe Scalp Backtest ────────────────────────────────
# Run: python scripts/run_backtest.py --config config/backtest_15m.yaml
#
# Requires both 15m AND 1H bars in the catalog:
#   python scripts/resample_bars.py --timeframes 15m
#   python scripts/resample_bars.py --timeframes 1h

backtest:
  instrument_id: "ETH-USDT-SWAP.OKX"
  timeframe: "15m"

  # Also feed 1H bars for the multi-timeframe direction filter
  higher_timeframes:
    - "1h"

  start: "2026-01-01"
  end: "2026-06-01"

  venue: "OKX"
  starting_balance: 100000.0
  currency: "USDT"

  fill_model_slippage_factor: 0.0002
  latency_model_base_secs: 0.001

  log_level: "WARNING"

strategy:
  path: "cyber_trader.strategies.scalp_15m:Scalp15mStrategy"
  config_path: "cyber_trader.strategies.scalp_15m:Scalp15mConfig"
  params:
    # ── 15m signal factors ──────────────────────────────────────────────
    kc_period: 20
    kc_k: 2.0
    ema_fast: 9
    ema_slow: 21
    stoch_period_k: 14
    stoch_period_d: 3
    stoch_slowing: 1   # Fast Stochastics; nautilus default. slowing=3/5 tested, both worse.

    kc_weight: 0.5
    ema_weight: 0.3
    stoch_weight: 0.2

    # ── Entry thresholds ────────────────────────────────────────────────
    long_threshold: 0.35
    short_threshold: -0.90   # effectively LONG-only pending direction-specific weight refactor

    # KC position filter for shorts: block entry when KC < -0.30
    # (price in the lower Keltner band, a dead-cat bounce zone).
    kc_short_min: -0.30

    # ── Signal-based exit thresholds ────────────────────────────────────
    # Slightly wider than v1 (±0.35) to reduce minor noise exits,
    # but not so wide that losing positions run to full SL.
    signal_exit_long: -0.42
    signal_exit_short: 0.42

    # min_hold_bars: 0  (disabled — blocks profitable early exits, causes
    # trades that would exit at -0.3% to instead run to SL at -1.0%)

    # 15m ADX gate (still active alongside MTF)
    adx_period: 14
    adx_threshold: 25.0
    # trend_ema_period is auto-disabled (set to 0) when higher_tf_bar_type is set
    trend_ema_period: 0

    # ── Multi-Timeframe direction gate ──────────────────────────────────
    # Must match an entry in backtest.higher_timeframes above
    higher_tf_bar_type: "ETH-USDT-SWAP.OKX-1-HOUR-LAST-EXTERNAL"
    higher_tf_ema_period: 50   # 50H EMA ≈ 2 days — macro swing direction

    # ── Volume confirmation ──────────────────────────────────────────────
    vol_confirm_bars: 5
    vol_confirm_factor: 1.0    # moderate filter, require at least average volume
    vol_confirm_factor_long: -1.0   # -1 = same factor for both directions

    # ── ATR-based SL/TP ─────────────────────────────────────────────────
    atr_period: 14
    atr_sl_mult: 1.5           # restored — wider SL (2.0) made losses bigger without
                               # reducing SL frequency, turning +0.98% avg loss into -1.36%
    atr_rr_ratio: 3.0          # TP = SL distance × 3.0  →  3:1 reward:risk

    # Fixed-% fallback (used if ATR not yet initialized)
    stop_loss_pct: 0.015
    take_profit_pct: 0.045

    # ── Risk ────────────────────────────────────────────────────────────
    risk_per_trade: 0.01
    leverage: 1.0
    # Halved from 0.50 → 0.25. This cuts commissions from ~$13k to ~$6.5k.
    # Gross PnL halves proportionally but commission saving exceeds lost edge
    # only on the LONG side (+$2k net LONG vs -$90 net SHORT expected).
    max_position_pct: 0.25
    max_drawdown_pct: 0.15
    max_daily_loss_pct: 0.05
    drawdown_cooldown_bars: 50
