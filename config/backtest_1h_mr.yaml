# ─── 1H Mean-Reversion Backtest ───────────────────────────────────────────────
# 把 15m 空头均值回归逻辑搬到 1H：每笔利润幅度更大，手续费占比更低
# 用 4H 作为高时间框架方向过滤（1H 的角色对应 15m 策略里的 1H）
#
# Run: python scripts/run_backtest.py --config config/backtest_1h_mr.yaml
#
# 需要 1H 和 4H bars:
#   python scripts/resample_bars.py --timeframes 1h
#   python scripts/resample_bars.py --timeframes 4h

backtest:
  instrument_id: "ETH-USDT-SWAP.OKX"
  timeframe: "1h"

  higher_timeframes:
    - "4h"

  start: "2026-01-01"
  end: "2026-06-01"

  venue: "OKX"
  starting_balance: 100000.0
  currency: "USDT"

  fill_model_slippage_factor: 0.0002
  latency_model_base_secs: 0.001

  log_level: "WARNING"

strategy:
  path: "cyber_trader.strategies.mr_15m:MR15mStrategy"
  config_path: "cyber_trader.strategies.mr_15m:MR15mConfig"
  params:
    # ── Bollinger Bands ──────────────────────────────────────────────────────
    bb_period: 20
    bb_k: 2.0
    bb_weight: 0.45

    # ── RSI ──────────────────────────────────────────────────────────────────
    rsi_period: 14
    rsi_weight: 0.35

    # ── Stochastic MR ────────────────────────────────────────────────────────
    stoch_period_k: 14
    stoch_period_d: 3
    stoch_slowing: 3
    stoch_weight: 0.20

    # ── Thresholds ───────────────────────────────────────────────────────────
    long_threshold: 2.0          # 纯空头模式（与 15m 测试保持一致）
    short_threshold: -0.25
    exit_threshold_ratio: 0.0    # 出场：得分回到0时（RSI/Stoch恢复中性）

    # ── ADX 震荡市过滤 ────────────────────────────────────────────────────────
    adx_period: 14
    adx_threshold: 25.0

    # ── 4H EMA20 方向过滤 ────────────────────────────────────────────────────
    # EMA20 比 EMA50 更灵敏，能更快识别趋势反转，精准拦截多头方向的假空信号
    higher_tf_bar_type: "ETH-USDT-SWAP.OKX-4-HOUR-LAST-EXTERNAL"
    higher_tf_ema_period: 20

    # ── ATR SL/TP（保持与最优 15m 配置一致的倍数）──────────────────────────────
    atr_period: 14
    atr_sl_mult: 1.5
    atr_rr_ratio: 2.0

    stop_loss_pct: 0.03
    take_profit_pct: 0.06

    # ── 最大持仓时间（32×1H = 32小时）──────────────────────────────────────────
    max_hold_bars: 32

    # ── Risk ─────────────────────────────────────────────────────────────────
    risk_per_trade: 0.01
    leverage: 1.0
    max_position_pct: 0.25
    max_drawdown_pct: 0.15
    max_daily_loss_pct: 0.05
    drawdown_cooldown_bars: 50
