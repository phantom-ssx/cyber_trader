# ─── Backtest Configuration ──────────────────────────────────────────────────
# Run: python scripts/run_backtest.py --config config/backtest.yaml

backtest:
  # Trading pair and timeframe
  # instrument_id format: {BASE}-{QUOTE}-SWAP.OKX  (perpetual)  |  {BASE}-{QUOTE}.OKX (spot)
  # timeframe options: 1m, 3m, 5m, 15m, 30m, 1h, 2h, 4h, 6h, 12h, 1d
  instrument_id: "ETH-USDT-SWAP.OKX"
  # 4h gives the best noise/signal trade-off for trend-following. The downloader
  # only stores 1m bars in the catalog; run `python scripts/resample_bars.py`
  # once to build 1h/4h/1d bars before backtesting on those timeframes.
  timeframe: "4h"

  # Time range (matches the downloaded ETH-USDT-SWAP data on disk)
  start: "2025-01-01"
  end: "2026-06-01"

  # Venue / account simulation
  venue: "OKX"
  starting_balance: 10000.0
  currency: "USDT"

  # Slippage & latency simulation
  fill_model_slippage_factor: 0.0001
  latency_model_base_secs: 0.001

  log_level: "WARNING"

# ─── Strategy Selection ───────────────────────────────────────────────────────
# Uncomment ONE strategy block (or modify to run all three and compare)

strategy:
  # ── Trend Following ──
  path: "cyber_trader.strategies.trend_following:TrendFollowingStrategy"
  config_path: "cyber_trader.strategies.trend_following:TrendFollowingConfig"
  params:
    ema_fast: 9
    ema_slow: 21
    macd_fast: 12
    macd_slow: 26
    ema_weight: 0.6
    macd_weight: 0.4
    risk_per_trade: 0.01
    stop_loss_pct: 0.02
    take_profit_pct: 0.04
    leverage: 1.0
    long_threshold: 0.25
    short_threshold: -0.25
    # Trend-regime filter: only long above / short below the 200-period EMA.
    # This removes most counter-trend whipsaw and is what turns the backtest
    # from negative to positive.
    trend_ema_period: 200
    max_position_pct: 0.30
    drawdown_cooldown_bars: 30
    funding_rate_weight: 0.2
    long_short_ratio_weight: 0.2

  # ── Mean Reversion (comment/uncomment to switch) ──
  # path: "cyber_trader.strategies.mean_reversion:MeanReversionStrategy"
  # config_path: "cyber_trader.strategies.mean_reversion:MeanReversionConfig"
  # params:
  #   bb_period: 20
  #   bb_k: 2.0
  #   rsi_period: 14
  #   bb_weight: 0.55
  #   rsi_weight: 0.45
  #   risk_per_trade: 0.01
  #   stop_loss_pct: 0.015
  #   take_profit_pct: 0.03
  #   leverage: 1.0
  #   long_threshold: 0.35
  #   short_threshold: -0.35

  # ── Momentum (comment/uncomment to switch) ──
  # path: "cyber_trader.strategies.momentum:MomentumStrategy"
  # config_path: "cyber_trader.strategies.momentum:MomentumConfig"
  # params:
  #   mom_period: 10
  #   vol_period: 20
  #   mom_weight: 0.7
  #   vol_weight: 0.3
  #   risk_per_trade: 0.01
  #   stop_loss_pct: 0.02
  #   take_profit_pct: 0.05
  #   leverage: 1.0
  #   long_threshold: 0.30
  #   short_threshold: -0.30
